name: Branch Protection

on:
  pull_request:
    types: [opened, synchronize, edited]
    branches: [main]

jobs:
  validate:
    name: Validate PR & Commits
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit message format
        uses: actions/github-script@v9
        with:
          script: |
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const conventionalPattern = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?:\s.+/;
            const errors = [];

            for (const c of commits) {
              const msg = c.commit.message.split('\n')[0];
              if (!conventionalPattern.test(msg)) {
                errors.push(`❌ \`${c.sha.slice(0, 7)}\`: "${msg}"`);
              }
            }

            if (errors.length > 0) {
              const body = [
                '## Commit Message Validation Failed',
                '',
                'The following commits do not follow [Conventional Commits](https://www.conventionalcommits.org/):',
                '',
                ...errors,
                '',
                'Expected format: `type(scope): description`',
                'Types: `feat`, `fix`, `docs`, `style`, `refactor`, `perf`, `test`, `build`, `ci`, `chore`, `revert`',
              ].join('\n');
              core.setFailed(body);
            }

      - name: Check PR has a description
        uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.pull_request.body;
            if (!body || body.trim().length < 10) {
              core.setFailed('PR must have a description (at least 10 characters). Please describe what this PR does.');
            }

name: Dependency Check

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9 AM UTC
  workflow_dispatch:        # Manual trigger

permissions:
  issues: write
  contents: read

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        continue-on-error: true
        run: |
          npm audit --json > audit-results.json 2>&1
          VULN_COUNT=$(node -e "const a=require('./audit-results.json'); console.log(a.metadata?.vulnerabilities?.total || 0)")
          echo "vuln_count=$VULN_COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $VULN_COUNT vulnerabilities"

      - name: Open or close issue based on results
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const vulnCount = parseInt('${{ steps.audit.outputs.vuln_count }}', 10);
            const issueTitle = '🔒 Security: npm audit found vulnerabilities';

            // Find existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
            });
            const existing = issues.find(i => i.title === issueTitle);

            if (vulnCount > 0) {
              let auditReport = 'Could not parse audit report.';
              try {
                const raw = JSON.parse(fs.readFileSync('audit-results.json', 'utf8'));
                const vulns = raw.metadata?.vulnerabilities || {};
                auditReport = [
                  `| Severity | Count |`,
                  `|----------|-------|`,
                  `| Critical | ${vulns.critical || 0} |`,
                  `| High | ${vulns.high || 0} |`,
                  `| Moderate | ${vulns.moderate || 0} |`,
                  `| Low | ${vulns.low || 0} |`,
                  `| **Total** | **${vulns.total || vulnCount}** |`,
                ].join('\n');
              } catch {}

              const body = `## npm audit report\n\n${auditReport}\n\nRun \`npm audit fix\` to resolve.\n\n_Auto-generated by dependency-check workflow._`;

              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body,
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issueTitle,
                  body,
                  labels: ['security'],
                });
              }
            } else if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
                state_reason: 'completed',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: '✅ All vulnerabilities resolved. Closing automatically.',
              });
            }

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Create release archive
        run: |
          mkdir -p dist
          tar -czf dist/todo-api-${{ github.ref_name }}.tar.gz \
            --exclude=node_modules --exclude=.git --exclude=dist \
            --exclude=coverage --exclude=.env .

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const tag = context.ref.replace('refs/tags/', '');

            // Generate changelog from commits since last tag
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 50,
            });

            const changelog = commits
              .slice(0, 20)
              .map(c => `- ${c.commit.message.split('\n')[0]} (${c.sha.slice(0, 7)})`)
              .join('\n');

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `## What's Changed\n\n${changelog}\n`,
              draft: false,
              prerelease: tag.includes('-'),
            });

            // Upload archive
            const archivePath = `dist/todo-api-${tag}.tar.gz`;
            const archive = fs.readFileSync(archivePath);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: `todo-api-${tag}.tar.gz`,
              data: archive,
            });

name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  # Modes: "observer" (comment only), "suggest" (recommend merge), "auto" (merge after human gate)
  REVIEW_MODE: auto
  MAX_FIX_ITERATIONS: 3

jobs:
  ai-review:
    name: Multi-Agent AI Review
    runs-on: ubuntu-latest
    outputs:
      verdict: ${{ steps.review.outputs.verdict }}
      confidence: ${{ steps.review.outputs.confidence }}
      auto_merge_eligible: ${{ steps.review.outputs.auto_merge_eligible }}
      has_blocking_findings: ${{ steps.review.outputs.has_blocking_findings }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt 2>/dev/null || echo "no diff" > pr_diff.txt
          LINES_CHANGED=$(wc -l < pr_diff.txt)
          echo "lines_changed=$LINES_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Count fix iterations
        id: iteration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Count how many fix-agent commits exist on this PR
          ITERATION=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json commits \
            --jq '[.commits[].messageHeadline | select(startswith("fix: auto-fix iteration"))] | length')
          NEXT=$((ITERATION + 1))
          echo "current=$ITERATION" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Fix iteration: $ITERATION (next would be $NEXT)"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Run AI Review Agents
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_DIFF: ${{ github.event.pull_request.diff_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          LINES_CHANGED: ${{ steps.diff.outputs.lines_changed }}
          REVIEW_MODE: ${{ env.REVIEW_MODE }}
        run: |
          export PR_DIFF="$(cat pr_diff.txt)"
          node .github/scripts/ai-review.js

      - name: Upload findings artifact
        if: steps.review.outputs.has_blocking_findings == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: review-findings
          path: findings.json
          retention-days: 1

  # ---- Fix Agent (self-healing loop) ----
  fix-agent:
    name: Fix Agent
    needs: ai-review
    if: |
      needs.ai-review.outputs.has_blocking_findings == 'true' &&
      needs.ai-review.outputs.verdict != 'PASS'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download findings
        uses: actions/download-artifact@v4
        with:
          name: review-findings

      - name: Get fix iteration count
        id: iteration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ITERATION=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json commits \
            --jq '[.commits[].messageHeadline | select(startswith("fix: auto-fix iteration"))] | length')
          NEXT=$((ITERATION + 1))
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Fix iteration will be: $NEXT"

      - name: Check iteration limit
        id: limit
        run: |
          if [ "${{ steps.iteration.outputs.next }}" -gt "${{ env.MAX_FIX_ITERATIONS }}" ]; then
            echo "exceeded=true" >> "$GITHUB_OUTPUT"
            echo "Max fix iterations reached"
          else
            echo "exceeded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.limit.outputs.exceeded == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Configure git
        if: steps.limit.outputs.exceeded == 'false'
        run: |
          git config user.name "fix-agent[bot]"
          git config user.email "fix-agent[bot]@users.noreply.github.com"

      - name: Run Fix Agent
        if: steps.limit.outputs.exceeded == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          FIX_ITERATION: ${{ steps.iteration.outputs.next }}
        run: node .github/scripts/fix-agent.js

  # ---- Human Approval Gate ----
  # This job only runs if AI says PASS and mode is "auto"
  # Requires a GitHub Environment "production" with required reviewers configured
  human-gate:
    name: Human Approval
    needs: ai-review
    if: needs.ai-review.outputs.auto_merge_eligible == 'true'
    runs-on: ubuntu-latest
    environment: production   # <-- Configure required reviewers in repo Settings > Environments
    steps:
      - name: Approval received
        run: echo "Human approved the merge"

  # ---- Auto-merge after human approval ----
  merge:
    name: Merge PR
    needs: [ai-review, human-gate]
    if: needs.ai-review.outputs.auto_merge_eligible == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto

name: PR Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  triage:
    name: Auto-label & Summarize PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-label and post PR summary
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const filenames = files.map(f => f.filename);
            const labelsToAdd = new Set();

            // --- Agentic label decision logic ---
            const labelRules = [
              { pattern: /^src\//, label: 'feature' },
              { pattern: /^tests\//, label: 'testing' },
              { pattern: /^\.github\//, label: 'ci/cd' },
              { pattern: /package\.json|package-lock\.json/, label: 'dependencies' },
              { pattern: /\.(md|txt)$/, label: 'documentation' },
            ];

            for (const file of filenames) {
              for (const rule of labelRules) {
                if (rule.pattern.test(file)) {
                  labelsToAdd.add(rule.label);
                }
              }
            }

            // Ensure labels exist before applying them
            const existingLabels = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existingNames = new Set(existingLabels.data.map(l => l.name));

            const labelColors = {
              'feature': '0075ca',
              'testing': 'e4e669',
              'ci/cd': 'd93f0b',
              'dependencies': '0052cc',
              'documentation': '0075ca',
            };

            for (const label of labelsToAdd) {
              if (!existingNames.has(label)) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: labelColors[label] || 'ededed',
                });
              }
            }

            if (labelsToAdd.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [...labelsToAdd],
              });
            }

            // --- Build summary stats ---
            const additions = files.reduce((sum, f) => sum + f.additions, 0);
            const deletions = files.reduce((sum, f) => sum + f.deletions, 0);
            const changedFiles = files.length;

            const fileList = filenames.map(f => `- \`${f}\``).join('\n');
            const labelList = labelsToAdd.size > 0
              ? [...labelsToAdd].map(l => `\`${l}\``).join(', ')
              : '_none_';

            // --- Post agentic review comment ---
            const body = [
              '## PR Agent Summary',
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Files changed | ${changedFiles} |`,
              `| Lines added | +${additions} |`,
              `| Lines removed | -${deletions} |`,
              `| Labels applied | ${labelList} |`,
              '',
              '### Changed files',
              fileList,
              '',
              '### Checklist',
              '- [ ] Tests cover new/changed behaviour',
              '- [ ] No secrets or credentials committed',
              '- [ ] Lint passes (`npm run lint`)',
              '- [ ] CI is green',
              '',
              '> _Generated automatically by the PR Agent workflow._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
